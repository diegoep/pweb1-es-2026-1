<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabela Básica</title>
    <style>
      table {
        border-collapse: collapse;
      }
      th {
        padding: 5px;
        background: #d1d1d1;
      }
      tr,
      td {
        border: 1px dashed #c0c0c0;
        padding: 5px;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <table border="1">
      <tr>
        <th>Nome</th>
        <th>Idade</th>
        <th>Cidade</th>
      </tr>
      <tr>
        <td>João Silva</td>
        <td>25</td>
        <td>João Pessoa</td>
      </tr>
      <tr>
        <td>Maria Santos</td>
        <td>30</td>
        <td>Campina Grande</td>
      </tr>
      <tr>
        <td>Pedro Costa</td>
        <td>28</td>
        <td>Patos</td>
      </tr>
      <tr>
        <td>Diego Pessoa</td>
        <td>37</td>
        <td>Campina Grande</td>
      </tr>
    </table>
  </body>
</html>
