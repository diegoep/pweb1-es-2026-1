<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elementos de Seleção</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 500px;
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h2 {
            color: #186fad;
            margin-bottom: 20px;
        }
        fieldset {
            border: 2px solid #186fad;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 20px;
        }
        legend {
            color: #186fad;
            font-weight: bold;
            padding: 0 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
        }
        select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .radio-group label, .checkbox-group label {
            display: inline-block;
            margin-right: 20px;
            font-weight: normal;
        }
        input[type="radio"], input[type="checkbox"] {
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Elementos de Seleção</h2>

        <fieldset>
            <legend>Radio Buttons (escolha única)</legend>
            <div class="radio-group">
                <label>
                    <input type="radio" name="turno" value="manha" checked>
                    Manhã
                </label>
                <label>
                    <input type="radio" name="turno" value="tarde">
                    Tarde
                </label>
                <label>
                    <input type="radio" name="turno" value="noite">
                    Noite
                </label>
            </div>
        </fieldset>

        <fieldset>
            <legend>Checkboxes (múltipla escolha)</legend>
            <div class="checkbox-group">
                <label>
                    <input type="checkbox" name="interesse" value="web" checked>
                    Programação Web
                </label>
                <br>
                <label>
                    <input type="checkbox" name="interesse" value="mobile" checked>
                    Desenvolvimento Mobile
                </label>
                <br>
                <label>
                    <input type="checkbox" name="interesse" value="dados">
                    Ciência de Dados
                </label>
            </div>
        </fieldset>

        <div class="form-group">
            <label for="estado">Select (lista suspensa):</label>
            <select id="estado" name="estado">
                <option value="">Selecione um estado...</option>
                <option value="PB" selected>Paraíba</option>
                <option value="PE">Pernambuco</option>
                <option value="RN">Rio Grande do Norte</option>
                <option value="CE">Ceará</option>
            </select>
        </div>

        <div class="form-group">
            <label for="mensagem">Textarea (texto longo):</label>
            <textarea id="mensagem" name="mensagem" rows="4" placeholder="Digite sua mensagem aqui..."></textarea>
        </div>
    </div>
</body>
</html>
