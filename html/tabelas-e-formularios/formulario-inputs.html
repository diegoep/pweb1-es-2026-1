<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tipos de Inputs</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background-color: #f5f5f5;
      }
      .container {
        max-width: 500px;
        background-color: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      h2 {
        color: #186fad;
        margin-bottom: 20px;
      }
      .form-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        color: #333;
        font-weight: bold;
      }
      input,
      textarea,
      select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 14px;
        box-sizing: border-box;
      }
      input:focus,
      textarea:focus,
      select:focus {
        outline: none;
        border-color: #186fad;
        box-shadow: 0 0 5px rgba(24, 111, 173, 0.3);
      }
    </style>
  </head>
  <body>
    <form action="#">
      <div class="container">
        <h2>Tipos de Inputs HTML5</h2>

        <div class="form-group">
          <label for="texto">Nome:</label>
          <input type="text" id="texto" placeholder="Digite seu nome" />
        </div>

        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" id="email" placeholder="seuemail@exemplo.com" />
        </div>

        <div class="form-group">
          <label for="senha">Senha:</label>
          <input type="password" id="senha" placeholder="••••••••" />
        </div>

        <div class="form-group">
          <label for="numero">Número (Idade 18-100):</label>
          <input type="number" id="numero" min="18" max="100" value="25" />
        </div>

        <div class="form-group">
          <label for="data">Data:</label>
          <input type="date" id="data" />
        </div>

        <div class="form-group">
          <label for="hora">Hora:</label>
          <input type="time" id="hora" />
        </div>

        <div class="form-group">
          <label for="cor">Cor:</label>
          <input type="color" id="cor" value="#186fad" />
        </div>

        <div class="form-group">
          <label for="range">Range (Volume):</label>
          <input type="range" id="range" min="0" max="100" value="50" />
        </div>
      </div>
      <button type="submit">Enviar</button>
    </form>
  </body>
</html>
