<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Tabelas</title>
    <link href="tabelas.css" rel="stylesheet">
</head>
<body>
    <h1>Exemplo de tabelas</h1>
    <table class="dados-pessoais">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Idade</th>
                <th>Cidade</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Ana</td>
                <td>25</td>
                <td>João Pessoa</td>
            </tr>
            <tr>
                <td>Bruno</td>
                <td>30</td>
                <td>Campina Grande</td>
            </tr>
            <tr>
                <td>Carlos</td>
                <td>28</td>
                <td>Recife</td>
            </tr>
            <tr>
                <td>Josefa</td>
                <td>22</td>
                <td>Natal</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
