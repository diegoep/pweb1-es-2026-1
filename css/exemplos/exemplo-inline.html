<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Inline</title>
</head>
<body>
    <h1 style="color: #186fad; font-family: Arial, sans-serif; text-align: center;">CSS Inline</h1>

    <p style="color: #444; font-size: 18px; line-height: 1.6; margin: 20px;">
        Este parágrafo usa <strong style="color: #22acd3;">CSS inline</strong> aplicado diretamente
        no atributo <code style="background-color: #f4f4f4; padding: 2px 6px; border-radius: 3px;">style</code>.
    </p>

    <div style="background-color: #e8f4f8; border-left: 4px solid #186fad; padding: 15px; margin: 20px;">
        <p style="margin: 0; color: #333;">
            <strong>Nota:</strong> CSS inline tem a maior especificidade, mas não é recomendado para uso geral.
        </p>
    </div>
</body>
</html>
