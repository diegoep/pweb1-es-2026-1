<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Interno</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f9f9f9;
        }

        h1 {
            color: #186fad;
            text-align: center;
            border-bottom: 3px solid #22acd3;
            padding-bottom: 10px;
        }

        p {
            color: #444;
            font-size: 18px;
            line-height: 1.6;
            margin: 20px 0;
        }

        .destaque {
            background-color: #e8f4f8;
            border-left: 4px solid #186fad;
            padding: 15px;
            margin: 20px 0;
        }

        .destaque strong {
            color: #186fad;
        }

        code {
            background-color: #f4f4f4;
            padding: 2px 6px;
            border-radius: 3px;
            color: #d63384;
        }
    </style>
</head>
<body>
    <h1>CSS Interno</h1>

    <p>
        Este exemplo usa <code>&lt;style&gt;</code> na tag <code>&lt;head&gt;</code>
        para definir estilos que se aplicam a toda a página.
    </p>

    <div class="destaque">
        <p>
            <strong>Vantagem:</strong> Os estilos estão organizados em um único lugar
            e podem ser reutilizados em toda a página.
        </p>
    </div>

    <p>
        Este método é melhor que CSS inline, mas ainda limita os estilos a uma única página.
    </p>
</body>
</html>
